name: iOS - Build & Upload to TestFlight

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  testflight:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Xcode version
        run: xcodebuild -version

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Capacitor sync (iOS)
        run: npx cap sync ios

      - name: Set build number
        working-directory: ios/App
        run: |
          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" App/Info.plist || true
          echo "Build number set to $BUILD_NUMBER"

      - name: Archive (xcarchive)
        working-directory: ios/App
        run: |
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$PWD/App.xcarchive" \
            -derivedDataPath "$PWD/build" \
            clean archive

      - name: Create exportOptions.plist
        working-directory: ios/App
        run: |
          cat > exportOptions.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          PLIST

      - name: Export IPA
        working-directory: ios/App
        run: |
          rm -rf export
          mkdir -p export
          xcodebuild \
            -exportArchive \
            -archivePath "$PWD/App.xcarchive" \
            -exportPath "$PWD/export" \
            -exportOptionsPlist "$PWD/exportOptions.plist"

          echo "Exported files:"
          ls -la export

      - name: Upload to TestFlight
        working-directory: ios/App
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_KEY_ISSUER_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          mkdir -p private_keys
          KEY_FILE="private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"
          echo "$APPLE_API_KEY" > "$KEY_FILE"

          IPA_PATH="$(ls -1 export/*.ipa | head -n 1)"
          echo "Uploading: $IPA_PATH"

          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APPLE_API_KEY_ID" \
            --apiIssuer "$APPLE_API_ISSUER_ID" \
            --verbose

      - name: Upload artifacts (xcarchive + ipa)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-testflight-artifacts
          path: |
            ios/App/App.xcarchive
            ios/App/export/*.ipa
            ios/App/exportOptions.plist
