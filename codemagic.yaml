workflows:
  ios-workflow:
    name: iOS Build & Upload to App Store
    instance_type: mac_mini_m1
    max_build_duration: 120

    environment:
      node: 22
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build web
        script: npm run build

      - name: Sync Capacitor
        script: npx cap sync ios

      - name: Build iOS Archive
        script: |
          cd ios/App
          mkdir -p ../build
          xcodebuild \
            -scheme App \
            -configuration Release \
            -derivedDataPath ../build \
            -archivePath ../build/App.xcarchive \
            -allowProvisioningUpdates \
            DEVELOPMENT_TEAM=6573BLNWHL \
            archive

      - name: Create ExportOptions.plist
        script: |
          cat > ios/build/ExportOptions.plist << 'EOF'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
	<key>method</key>
	<string>app-store</string>
	<key>signingStyle</key>
	<string>automatic</string>
	<key>stripSwiftSymbols</key>
	<true/>
	<key>teamID</key>
	<string>6573BLNWHL</string>
	<key>uploadBitcode</key>
	<false/>
</dict>
</plist>
EOF

      - name: Export IPA
        script: |
          cd ios/App
          xcodebuild \
            -exportArchive \
            -archivePath ../build/App.xcarchive \
            -exportOptionsPlist ../build/ExportOptions.plist \
            -exportPath ../build/ipa

      - name: Upload to App Store Connect
        script: |
          xcrun altool \
            --upload-app \
            --file ios/build/ipa/App.ipa \
            --type ios \
            --apiKey $APP_STORE_API_KEY \
            --apiIssuer $APP_STORE_API_ISSUER \
            --apiKeyId $APP_STORE_KEY_ID

    artifacts:
      - ios/build/App.xcarchive
      - ios/build/ipa/App.ipa

    publishing:
      email:
        recipients:
          - danielpintal@gmail.com
