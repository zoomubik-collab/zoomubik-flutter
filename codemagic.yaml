workflows:
  ios-workflow:
    name: iOS Build (Flutter)
    instance_type: mac_mini_m1
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        CM_APPLE_DEV_TEAM_ID: "6573BLNWHL"
        APP_STORE_CONNECT_TEAM_ID: "6573BLNWHL"
    scripts:
      - name: Clean all caches
        script: |
          rm -rf ~/Library/Developer/Xcode/DerivedData/*
          rm -rf ~/.pub-cache
          rm -rf .dart_tool
          rm -rf build
          rm -rf ios/Pods
          rm -rf ios/Podfile.lock
      - name: Install Flutter dependencies
        script: |
          flutter clean
          flutter pub get
      - name: Pod Install
        script: |
          cd $CM_BUILD_DIR/ios
          rm -rf Pods Podfile.lock
          pod install --repo-update
      - name: Build Flutter
        script: |
          flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/*.app
