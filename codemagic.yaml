workflows:
  ios-workflow:
    name: iOS Build & Upload to App Store
    instance_type: mac_mini_m1
    max_build_duration: 120

    environment:
      node: 22
      xcode: latest
      cocoapods: default
      vars:
        CM_APPLE_DEV_TEAM_ID: "6573BLNWHL"
        CM_APPLE_API_KEY_ID: "467A28W6ZS"
        CM_APPLE_API_KEY_ISSUER_ID: "f6677e56-c6f1-4b84-af63-9e93f843034a"
        CM_APPLE_API_KEY: |-
          -----BEGIN PRIVATE KEY-----
          MIGTAgEAMBMGByqGSM49AgEGCCqGSM49AwEHBHkwdwIBAQQgAC7E6pfvrnlwgV0k
          fwj+RZAbhHonxJT4wjI1l0GjeaGgCgYIKoZIzj0DAQehRANCAAQPdk3UTXl9/JzC
          0agxbVBDoxXTDUyhhvIaeHsqf8vxcUhkvuO36DFl9nB7RLEV3Jcc9DrMis8kxEVE
          WvjpKpni
          -----END PRIVATE KEY-----
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.zoomubik.app

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build web
        script: npm run build

      - name: Sync Capacitor
        script: npx cap sync ios

      - name: Clean iOS project
        script: |
          cd ios/App
          xcodebuild -scheme App -configuration Release clean 2>/dev/null || true
          rm -rf ../build
          rm -rf ~/Library/Developer/Xcode/DerivedData

      - name: Build iOS Archive
        script: |
          cd ios/App
          mkdir -p ../build
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -sdk iphoneos \
            -archivePath ../build/App.xcarchive \
            -derivedDataPath ../build \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=$CM_APPLE_DEV_TEAM_ID \
            archive

      - name: Export IPA
        script: |
          cd ios/App
          xcodebuild \
            -exportArchive \
            -archivePath ../build/App.xcarchive \
            -exportOptionsPlist <(cat <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "[apple.com](http://www.apple.com/DTDs/PropertyList-1.0.dtd)">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>signingStyle</key>
              <string>automatic</string>
              <key>teamID</key>
              <string>$CM_APPLE_DEV_TEAM_ID</string>
          </dict>
          </plist>
          EOF) \
            -exportPath ../build/ipa

    artifacts:
      - ios/build/App.xcarchive
      - ios/build/ipa/App.ipa

    publishing:
      app_store_connect:
        api_key:
          key_id: $CM_APPLE_API_KEY_ID
          issuer_id: $CM_APPLE_API_KEY_ISSUER_ID
          key: $CM_APPLE_API_KEY
        submit_to_testflight: true
      email:
        recipients:
          - danielpintal@gmail.com
