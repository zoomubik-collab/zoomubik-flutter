workflows:
  ios-workflow:
    name: iOS Build & Upload to App Store (Flutter)
    instance_type: mac_mini_m1
    max_build_duration: 120
    environment:
      flutter: 3.35.7
      xcode: latest
      cocoapods: default
      groups:
        - app-store-credentials3
        - firebase-secrets
      vars:
        CM_APPLE_DEV_TEAM_ID: "6573BLNWHL"
        APP_STORE_CONNECT_TEAM_ID: "6573BLNWHL"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.zoomubik.app
    scripts:
      - name: Restore GoogleService-Info.plist
        script: |
          echo $GOOGLE_SERVICE_INFO_PLIST | base64 --decode > $CM_BUILD_DIR/ios/Runner/GoogleService-Info.plist
          echo "=== Contenido completo ==="
          cat $CM_BUILD_DIR/ios/Runner/GoogleService-Info.plist
      - name: Install Flutter dependencies
        script: |
          flutter clean
          flutter pub get
      - name: Generate app icon
        script: |
          dart run flutter_launcher_icons
      - name: Pod Install
        script: |
          echo "=== Contenido de ios/ ==="
          ls $CM_BUILD_DIR/ios/
          echo "=== Buscando Podfile ==="
          find $CM_BUILD_DIR -name "Podfile" 2>/dev/null
          cd $CM_BUILD_DIR/ios
          rm -rf Pods Podfile.lock
          pod install --repo-update --verbose
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Bump build number
        script: |
          LATEST=$(app-store-connect get-latest-testflight-build-number 6760907092)
          cd ios && agvtool new-version -all $(($LATEST + 1))
      - name: Build Flutter
        script: |
          flutter build ios --release --no-codesign
      - name: Build IPA
        script: |
          cd ios
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/Runner.xcarchive \
            -destination generic/platform=iOS \
            DEVELOPMENT_TEAM="6573BLNWHL" \
            CODE_SIGN_STYLE="Manual" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="zoomubik-app-store" \
            PODS_CODE_SIGN_STYLE=Automatic \
            CODE_SIGN_ENTITLEMENTS="Runner/Runner.entitlements" \
            archive
          xcodebuild -exportArchive \
            -archivePath build/Runner.xcarchive \
            -exportOptionsPlist ../ios_export_options.plist \
            -exportPath build/ipa
    artifacts:
      - ios/build/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true

  android-workflow:
    name: Android Build (Flutter)
    instance_type: linux_x2
    max_build_duration: 60
    environment:
      flutter: 3.35.7
      groups:
        - android-signing
    scripts:
      - name: Install Flutter dependencies
        script: |
          flutter clean
          flutter pub get
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$FLUTTER_ROOT" > $CM_BUILD_DIR/android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> $CM_BUILD_DIR/android/local.properties
      - name: Set up keystore
        script: |
          echo $CM_KEYSTORE | base64 --decode > $CM_BUILD_DIR/android/app/upload-keystore.jks
      - name: Build Android AAB
        script: |
          flutter build appbundle --release
    artifacts:
      - **/app/build/outputs/bundle/release/*.aab
