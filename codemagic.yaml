workflows:
  ios-workflow:
    name: iOS Build & Upload to App Store
    instance_type: mac_mini_m1
    max_build_duration: 120

    environment:
      node: 22
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build web
        script: npm run build

      - name: Sync Capacitor
        script: npx cap sync ios

      - name: Clean iOS project
        script: |
          cd ios/App
          xcodebuild -scheme App -configuration Release clean 2>/dev/null || true
          rm -rf ../build
          rm -rf ~/Library/Developer/Xcode/DerivedData

      - name: Build iOS Archive
        script: |
          cd ios/App
          mkdir -p ../build

          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -sdk iphoneos \
            -archivePath ../build/App.xcarchive \
            -derivedDataPath ../build \
            -authenticationKeyPath "$CM_APPLE_API_KEY_PATH" \
            -authenticationKeyID "$CM_APPLE_API_KEY_ID" \
            -authenticationKeyIssuerID "$CM_APPLE_API_KEY_ISSUER_ID" \
            -allowProvisioningUpdates \
            DEVELOPMENT_TEAM=69b9d673946f5ca97e31a0ee \
            CODE_SIGN_STYLE=Automatic \
            archive

      - name: Create ExportOptions.plist
        script: |
          mkdir -p ios/build
          cat > ios/build/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>

              <key>signingStyle</key>
              <string>automatic</string>

              <key>teamID</key>
              <string>69b9d673946f5ca97e31a0ee</string>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        script: |
          cd ios/App
          xcodebuild \
            -exportArchive \
            -archivePath ../build/App.xcarchive \
            -exportOptionsPlist ../build/ExportOptions.plist \
            -exportPath ../build/ipa

      - name: Upload to App Store Connect
        script: |
          xcrun altool \
            --upload-app \
            --file ios/build/ipa/App.ipa \
            --type ios \
            --apiKey "$CM_APPLE_API_KEY_ID" \
            --apiIssuer "$CM_APPLE_API_KEY_ISSUER_ID"

    artifacts:
      - ios/build/App.xcarchive
      - ios/build/ipa/App.ipa

    publishing:
      email:
        recipients:
          - danielpintal@gmail.com