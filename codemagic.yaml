workflows:
  ios-workflow:
    name: iOS Build & Upload to App Store
    instance_type: mac_mini_m1
    max_build_duration: 120

    environment:
      node: 22
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build web
        script: npm run build

      - name: Sync Capacitor
        script: npx cap sync ios

      - name: Clean iOS project
        script: |
          cd ios/App
          rm -rf build
          rm -rf ~/Library/Developer/Xcode/DerivedData

      - name: Build iOS Archive
        script: |
          cd ios/App
          mkdir -p ../build

          xcodebuild \
            -scheme App \
            -configuration Release \
            -archivePath ../build/App.xcarchive \
            -derivedDataPath ../build \
            -allowProvisioningUpdates \
            DEVELOPMENT_TEAM=6573BLNWHL \
            CODE_SIGN_STYLE=Automatic \
            clean archive

      - name: Create ExportOptions.plist
        script: |
          mkdir -p ios/build
          cat > ios/build/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>

              <key>signingStyle</key>
              <string>automatic</string>

              <key>stripSwiftSymbols</key>
              <true/>

              <key>uploadBitcode</key>
              <false/>

              <key>teamID</key>
              <string>6573BLNWHL</string>

              <key>provisioningProfiles</key>
              <dict>
                  <key>com.zoomubik.app</key>
                  <string>match AppStore com.zoomubik.app</string>
              </dict>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        script: |
          cd ios/App
          xcodebuild \
            -exportArchive \
            -archivePath ../build/App.xcarchive \
            -exportOptionsPlist ../build/ExportOptions.plist \
            -exportPath ../build/ipa

      - name: Upload to App Store Connect
        script: |
          xcrun altool \
            --upload-app \
            --file ios/build/ipa/App.ipa \
            --type ios \
            --apiKey $APP_STORE_API_KEY \
            --apiIssuer $APP_STORE_API_ISSUER \
            --apiKeyId $APP_STORE_KEY_ID

    artifacts:
      - ios/build/App.xcarchive
      - ios/build/ipa/App.ipa

    publishing:
      email:
        recipients:
          - danielpintal@gmail.com
