workflows:
  ios-workflow:
    name: iOS Build & Upload to App Store
    instance_type: mac_mini_m1
    max_build_duration: 120
    environment:
      node: "22"
      xcode: latest
      cocoapods: default
      vars:
        CM_APPLE_DEV_TEAM_ID: "6573BLNWHL"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.zoomubik.app
    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Build web
        script: npm run build

      - name: Sync Capacitor
        script: npx cap sync ios

      - name: Build iOS Archive
        script: |
          cd ios/App
          mkdir -p build
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -sdk iphoneos \
            -archivePath build/App.xcarchive \
            CODE_SIGN_STYLE="Automatic" \
            CODE_SIGNING_ALLOWED="YES" \
            DEVELOPMENT_TEAM="$CM_APPLE_DEV_TEAM_ID" \
            archive

      - name: Export IPA
        script: |
          cd ios/App
          cat > build/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>teamID</key>
            <string>$CM_APPLE_DEV_TEAM_ID</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
          xcodebuild \
            -exportArchive \
            -archivePath build/App.xcarchive \
            -exportOptionsPlist build/ExportOptions.plist \
            -exportPath build/ipa

    artifacts:
      - ios/App/build/App.xcarchive
      - ios/App/build/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
