workflows:
  ios-workflow:
    name: iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 120
    environment:
      node: 22
    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build web
        script: npm run build

      - name: Sync Capacitor
        script: npx cap sync ios

      - name: Build iOS
        script: |
          xcodebuild \
            -project ios/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -derivedDataPath ios/build \
            -archivePath ios/build/App.xcarchive \
            archive

    artifacts:
      - ios/build/App.xcarchive
