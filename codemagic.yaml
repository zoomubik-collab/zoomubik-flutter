workflows:
  ios-workflow:
    name: iOS Workflow
    instance_type: mac_mini_m1
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_id: com.zoomubik.app
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build iOS
        script: |
          npm run build
          npx cap sync ios
          xcodebuild -workspace ios/App/App.xcworkspace -scheme App -configuration Release -derivedDataPath build -archivePath build/App.xcarchive archive
      - name: Export IPA
        script: |
          xcodebuild -exportArchive -archivePath build/App.xcarchive -exportOptionsPlist ios/ExportOptions.plist -exportPath build/ipa
    artifacts:
      - build/ipa/**/*.ipa
